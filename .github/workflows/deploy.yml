name: Java CD pipeline

on:
    push:
        branches:
            - 'main'
            - 'config-*'
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
        -   name: 1. Checkout code
            uses: actions/checkout@v6

        -   name: 2. Install Java 25
            uses: actions/setup-java@v5
            with:
                java-version: '25'
                distribution: 'temurin'
                cache: maven

        -   name: 3. Build file JAR by Maven
            run: mvn clean package -DskipTests

        -   name: 3.5. Change name file JAR to override
            run: mv target/*.jar target/minboo-app.jar

        -   name: 4. Copy file JAR to AWS EC2
            uses: appleboy/scp-action@master
            with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                source: "target/minboo-app.jar"
                target: "/home/${{ secrets.EC2_USERNAME }}/app/"
                strip_components: 1

        -   name: 5. Restart application on EC2
            uses: appleboy/ssh-action@master
            with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    cd /home/${{ secrets.EC2_USERNAME }}/app/

                    # Kill old process
                    fuser -k 8080/tcp || true

                    # Bơm biến môi trường Database từ GitHub Secrets vào hệ điều hành EC2

                    export SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}"

                    # export SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
                    # export SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}

                    export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
                    export SIGHTENGINE_API_USER="${{ secrets.SIGHTENGINE_API_USER }}"
                    export SIGHTENGINE_API_SECRET="${{ secrets.SIGHTENGINE_API_SECRET }}"

                    nohup /home/ubuntu/.sdkman/candidates/java/current/bin/java -jar minboo-app.jar > application.log 2>&1 &
                        
                    echo "Success Deploy ! App is running."


name: Java CD pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Package and Push to GHCR
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: 1. Checkout code
      uses: actions/checkout@v6

    - name: 2. Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 3. Build and push image to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/dpsgion/minboo-app:latest

  # Deploy to EC2
  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          echo "Starting deployment process for MinBoo..."

          # 1. Kéo Image
          docker pull ghcr.io/dpsgion/minboo-app:latest

          # 2. Xóa container cũ
          docker stop minboo-container || true
          docker rm minboo-container || true

          # 3. Khởi động Container (Viết kiểu này để tránh lỗi dấu cách sau dấu \)
          docker run -d \
          --name minboo-container \
          --restart unless-stopped \
          -p 8080:8080 \
          -e SPRING_DATASOURCE_URL='${{ secrets.SPRING_DATASOURCE_URL }}' \
          -e SPRING_DATASOURCE_USERNAME='${{ secrets.SPRING_DATASOURCE_USERNAME }}' \
          -e SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}' \
          -e SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT='org.hibernate.dialect.PostgreSQLDialect' \
          -e SPRING_JPA_HIBERNATE_DDL_AUTO='update' \
          -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
          -e SIGHTENGINE_API_USER='${{ secrets.SIGHTENGINE_API_USER }}' \
          -e SIGHTENGINE_API_SECRET='${{ secrets.SIGHTENGINE_API_SECRET }}' \
          ghcr.io/dpsgion/minboo-app:latest

          echo "🚀 Deploy thành công!"
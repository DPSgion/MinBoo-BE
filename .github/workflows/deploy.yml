name: Java CD pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Package and Push to GHCR
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: 1. Checkout code
      uses: actions/checkout@v6

    - name: 2. Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 3. Build and push image to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/dpsgion/minboo-app:latest

  # Deploy to EC2
  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Starting deployment process for MinBoo..."

          # 1. Kéo Image mới nhất từ kho GHCR về EC2
          docker pull ghcr.io/dpsgion/minboo-app:latest

          # 2. Dừng và xóa phiên bản cũ đang chạy
          docker stop minboo-container || true
          docker rm minboo-container || true

          # 3. Khởi động Container mới
          docker run -d \
            --name minboo-container \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e SIGHTENGINE_API_USER="${{ secrets.SIGHTENGINE_API_USER }}" \
            -e SIGHTENGINE_API_SECRET="${{ secrets.SIGHTENGINE_API_SECRET }}" \
            ghcr.io/dpsgion/minboo-app:latest

          echo "🚀 Deploy thành công!"
name: Java CI with Maven

# 1. When should the robot wake up ?
on:
    push: # if doesn't have any code branches: ..., the robot will test all branches if someone push
        # branches: [ "main" ] # Runs when someone push to main
    pull_request:
        branches: [ "main" ] # Runs when someone tries to merge code into main
        
jobs:
    build:
        runs-on: ubuntu-latest # OS which machine will run
        
        steps:
        - name: 1. Download code
          uses: actions/checkout@v6
          
        - name: 2. Install Java
          uses: actions/setup-java@v5
          with:
            java-version: '25'
            distribution: 'temurin'
            cache: 'maven'
            
        - name: 3. Build and test
          run: mvn -B package --file pom.xml
          env:
            SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
            # SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
            # SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}

            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
            SIGHTENGINE_API_USER: ${{ secrets.SIGHTENGINE_API_USER }}
            SIGHTENGINE_API_SECRET: ${{ secrets.SIGHTENGINE_API_SECRET }}
        